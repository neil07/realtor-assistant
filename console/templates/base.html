<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Reel Agent Console{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      .htmx-indicator {
        opacity: 0;
        transition: opacity 0.2s;
      }
      .htmx-request .htmx-indicator {
        opacity: 1;
      }
      .htmx-request.htmx-indicator {
        opacity: 1;
      }
    </style>
    {% block extra_head %}{% endblock %}
  </head>
  <body
    class="bg-slate-50 text-slate-900 min-h-screen selection:bg-blue-500/20"
  >
    <nav
      class="flex items-center justify-between px-6 py-4 border-b border-slate-200 bg-white/80 backdrop-blur-xl sticky top-0 z-50 shadow-sm"
    >
      <div
        class="text-lg font-semibold tracking-tight text-slate-900 flex items-center gap-2"
      >
        <span class="text-xl">🎬</span> Reel Agent Console
      </div>
      <div class="flex items-center space-x-2">
        <a
          href="/console/"
          class="px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 {% if active_page == 'dashboard' %}bg-slate-100 text-blue-600{% else %}text-slate-500 hover:text-slate-900 hover:bg-slate-50{% endif %}"
          >仪表盘</a
        >
        <a
          href="/console/onboard"
          class="px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 {% if active_page == 'onboard' %}bg-slate-100 text-blue-600{% else %}text-slate-500 hover:text-slate-900 hover:bg-slate-50{% endif %}"
          >+ 新增客户</a
        >
        <div class="w-px h-6 bg-slate-200 mx-2"></div>
        <a
          href="/"
          class="ml-2 px-4 py-1.5 rounded-lg text-sm font-medium border border-slate-200 text-slate-600 hover:text-slate-900 hover:border-slate-300 transition-all duration-200 hover:shadow-sm bg-white"
          >测试</a
        >
      </div>
    </nav>
    <main class="max-w-5xl mx-auto px-6 py-10">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
